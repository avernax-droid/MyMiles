<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMiles - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@1,700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --primary-dark: #0f172a; 
            --accent-blue: #1d4ed8; 
            --bg-page: #eef2f6; 
            --bg-search: #cfe2ff; 
        }

        body { 
            background-color: var(--bg-page);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--bg-search);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            border: 1px solid #accbff;
        }

        .logo-login {
            font-family: 'Kanit', sans-serif;
            font-weight: 700;
            font-style: italic;
            color: var(--primary-dark);
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 30px;
            transform: skewX(-6deg);
            letter-spacing: 1px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #cbd5e1;
        }

        .btn-login {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-login:hover { background: #1e40af; transform: translateY(-2px); }
        
        .link-cadastro { color: var(--accent-blue); text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="logo-login">MyMiles</div>
    
    <!-- MENSAGENS DE ERRO/SUCESSO -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} small py-2">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form action="{{ url_for('login') }}" method="POST">
        <div class="mb-3">
            <label class="form-label small fw-bold">E-MAIL</label>
            <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold">SENHA</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-login mb-3">Entrar</button>
    </form>
    
    <div class="text-center small">
        Não tem conta? <a href="{{ url_for('cadastro') }}" class="link-cadastro">Cadastre-se</a>
    </div>
</div>

</body>
</html>
