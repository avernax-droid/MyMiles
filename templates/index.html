<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMiles Sniper - V2.6.2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.02.min.css">
    
    <style>
        :root { --sniper-gold: #fcc419; }
        .horario-tag { font-size: 0.8rem; font-weight: bold; background: #f1f3f5; padding: 4px 8px; border-radius: 6px; color: #212529; border: 1px solid #dee2e6; }
        .info-voo { font-size: 0.75rem; color: #6c757d; display: block; margin-top: 5px; line-height: 1.5; }
        .status-badge { font-size: 0.65rem; font-weight: bold; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; }
        .table-v2 td { vertical-align: top; padding: 16px !important; border-bottom: 1px solid #f1f1f1; }
        .table-warning { background-color: #fff9db !important; border-left: 5px solid var(--sniper-gold); }
        #loaderArea { display: none; }
        .autoComplete_wrapper { width: 100% !important; }
        .autoComplete_wrapper > input { width: 100% !important; height: 42px; border-radius: 8px !important; border: 1px solid #ced4da !important; }
        .form-label-sm { font-size: 0.75rem; font-weight: bold; color: #495057; margin-bottom: 4px; display: block; }
        .text-total-reserva { font-size: 0.7rem; color: #adb5bd; margin-top: 2px; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-5">
    <div class="card p-4 shadow-sm mb-4 border-0" style="border-radius: 15px;">
        <h2 class="text-primary mb-4 fw-bold"><i class="bi bi-target"></i> MyMiles Sniper</h2>
        <div class="row g-3 align-items-end">
            <div class="col-md-2">
                <span class="form-label-sm">ORIGEM</span>
                <input id="origem" type="search" placeholder="Ex: GRU" class="form-control">
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">DESTINO</span>
                <input id="destino" type="search" placeholder="Ex: FCO" class="form-control">
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">DATAS (IDA / VOLTA)</span>
                <div class="input-group">
                    <input type="date" id="data_ida" class="form-control">
                    <input type="date" id="data_volta" class="form-control">
                </div>
            </div>
            <div class="col-md-1">
                <span class="form-label-sm">PAX</span>
                <input type="number" id="passageiros" class="form-control" value="1" min="1">
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">CLASSE</span>
                <select id="classe" class="form-select">
                    <option value="ECONOMY" selected>Econômica</option>
                    <option value="BUSINESS">Executiva</option>
                </select>
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">CUSTO MILHEIRO (R$)</span>
                <input type="number" id="custo_milheiro" class="form-control" value="17.50" step="0.10">
            </div>
            <div class="col-md-1">
                <button class="btn btn-primary w-100 fw-bold" style="height:42px" onclick="executarBusca()">BUSCAR</button>
            </div>
        </div>
    </div>

    <div id="loaderArea" class="text-center p-5">
        <div class="spinner-grow text-primary"></div>
        <h5 class="mt-3 text-secondary">Sniping flights...</h5>
    </div>

    <div id="resultadoArea" style="display:none;">
        <div class="card shadow-sm border-0" style="border-radius: 15px; overflow: hidden;">
            <div class="table-responsive">
                <table class="table table-hover mb-0 table-v2">
                    <thead class="table-dark">
                        <tr>
                            <th width="25%">Trecho Ida</th>
                            <th width="25%">Trecho Volta</th>
                            <th class="text-end" width="15%">Preço Pagante</th>
                            <th class="text-end text-warning" width="15%">Teto Sniper (Milhas)</th>
                            <th class="text-center" width="10%">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaResultados"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
<script>
    const aeroportos = [
        { name: "São Paulo - Guarulhos", code: "GRU" }, { name: "São Paulo - Congonhas", code: "CGH" },
        { name: "Rio de Janeiro - Galeão", code: "GIG" }, { name: "Brasília", code: "BSB" },
        { name: "Roma - Fiumicino", code: "FCO" }, { name: "Lisboa", code: "LIS" },
        { name: "Madrid - Barajas", code: "MAD" }, { name: "Londres - Heathrow", code: "LHR" },
        { name: "Paris - CDG", code: "CDG" }, { name: "Frankfurt", code: "FRA" },
        { name: "Miami", code: "MIA" }, { name: "Nova York - JFK", code: "JFK" },
        { name: "Buenos Aires - Ezeiza", code: "EZE" }, { name: "Santiago", code: "SCL" }
    ];

    const setup = (id) => {
        new autoComplete({
            selector: `#${id}`,
            data: { src: aeroportos, keys: ["name", "code"] },
            resultItem: { element: (item, data) => {
                item.innerHTML = `<div class="d-flex justify-content-between"><span>${data.value.name}</span><b>${data.value.code}</b></div>`;
            }},
            events: { input: { selection: (event) => {
                const sel = event.detail.selection.value;
                document.getElementById(id).value = sel.code; // Armazena apenas o código para facilitar o envio
            }}}
        });
    };
    setup("origem"); setup("destino");

    async function executarBusca() {
        const pax = parseInt(document.getElementById('passageiros').value);
        const custo = parseFloat(document.getElementById('custo_milheiro').value);
        
        // Limpeza básica caso o usuário digite o nome manualmente
        const getCode = (id) => {
            const val = document.getElementById(id).value.trim();
            return val.includes('-') ? val.split('-').pop().trim() : val.toUpperCase();
        };

        const params = {
            origem: getCode('origem'),
            destino: getCode('destino'),
            data_ida: document.getElementById('data_ida').value,
            data_volta: document.getElementById('data_volta').value,
            classe: document.getElementById('classe').value,
            custo_milheiro: custo,
            pax: pax
        };

        document.getElementById('loaderArea').style.display = 'block';
        document.getElementById('resultadoArea').style.display = 'none';

        try {
            const res = await fetch('/buscar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(params)
            });
            const data = await res.json();
            
            if(data.status === "sucesso") {
                const tabela = document.getElementById('tabelaResultados');
                tabela.innerHTML = "";
                
                data.dados.forEach((itin, index) => {
                    const precoUnitarioBRL = itin.valor_sort; 
                    
                    // Cálculo Sniper: (Preço Unitário - Estimativa Taxa Embarque) / (Custo Milheiro/1000)
                    const taxaEst = itin.tipo === "RT" ? 480 : 240; 
                    const teto = Math.floor((precoUnitarioBRL - taxaEst) / (custo / 1000));
                    
                    const isBest = index === 0;

                    let row = `<tr class="${isBest ? 'table-warning' : ''}">
                        <td>
                            ${isBest ? '<span class="badge bg-danger mb-1"><i class="bi bi-fire"></i> MELHOR PREÇO</span><br>' : ''}
                            <div class="mb-2">
                                <span class="status-badge bg-primary text-white">IDA</span> <b>${itin.cia}</b>
                            </div>
                            <span class="horario-tag"><i class="bi bi-clock"></i> ${itin.ida_hora}</span>
                            <span class="info-voo">
                                <i class="bi bi-calendar3"></i> ${itin.ida_data}<br>
                                <i class="bi bi-geo-alt"></i> ${itin.ida_paradas} • <i class="bi bi-hourglass-split"></i> ${itin.ida_duracao}
                            </span>
                        </td>
                        <td>
                            ${itin.tipo === "RT" ? `
                                <div style="height: 20px"></div>
                                <div class="mb-2">
                                    <span class="status-badge bg-secondary text-white">VOLTA</span> <b>${itin.cia}</b>
                                </div>
                                <span class="horario-tag"><i class="bi bi-clock"></i> ${itin.volta_hora}</span>
                                <span class="info-voo">
                                    <i class="bi bi-calendar3"></i> ${itin.volta_data}<br>
                                    <i class="bi bi-geo-alt"></i> ${itin.volta_paradas} • <i class="bi bi-hourglass-split"></i> ${itin.volta_duracao}
                                </span>
                            ` : '<div class="text-muted small mt-4">Trecho Único</div>'}
                        </td>
                        <td class="text-end pt-4">
                            <div class="fw-bold" style="font-size: 1.1rem;">${itin.preco_fmt}</div>
                            <div class="text-muted small">por pessoa</div>
                            <div class="text-total-reserva">Total: ${itin.preco_total_fmt}</div>
                        </td>
                        <td class="text-end text-success fw-bold pt-4" style="font-size: 1.1rem;">
                            ${teto > 0 ? teto.toLocaleString('pt-BR') + ' pts' : '---'}
                            <div class="text-muted fw-normal" style="font-size: 0.65rem;">Sugerido por PAX</div>
                        </td>
                        <td class="text-center pt-4">
                            <a href="${itin.link}" target="_blank" class="btn btn-dark btn-sm px-4 rounded-pill">Ver</a>
                        </td>
                    </tr>`;
                    tabela.innerHTML += row;
                });
                document.getElementById('resultadoArea').style.display = 'block';
            } else {
                alert("Erro: " + data.mensagem);
            }
        } catch(e) { 
            alert("Erro na conexão com o servidor."); 
        } finally { 
            document.getElementById('loaderArea').style.display = 'none'; 
        }
    }
</script>
</body>
</html>
