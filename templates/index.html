<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>MyMiles Sniper - V2.3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.02.min.css">
    <style>
        .horario-tag { font-size: 0.8rem; font-weight: bold; background: #f1f3f5; padding: 2px 5px; border-radius: 4px; border: 1px solid #dee2e6; }
        #loaderArea { display: none; }
        .autoComplete_wrapper { width: 100% !important; }
        .autoComplete_wrapper > input { 
            width: 100% !important; height: 38px; 
            border: 1px solid #dee2e6 !important; border-radius: 0.375rem !important; 
            padding: 10px !important;
        }
        .autoComplete_wrapper > ul { z-index: 9999 !important; border: 1px solid #ddd !important; }
        .table-v2 td { vertical-align: middle; padding: 15px 10px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-5">
    <div class="card p-4 shadow-sm mb-4 border-0">
        <h2 class="text-primary mb-4 fw-bold">MyMiles Sniper 🎯</h2>
        <div class="row g-2">
            <div class="col-md-2">
                <label class="small fw-bold">Origem</label>
                <input id="origem" type="search" autocomplete="off" placeholder="Ex: Manaus ou MAO" class="form-control">
            </div>
            <div class="col-md-2">
                <label class="small fw-bold">Destino</label>
                <input id="destino" type="search" autocomplete="off" placeholder="Ex: Buenos Aires" class="form-control">
            </div>
            <div class="col-md-1">
                <label class="small fw-bold">Ida (GMT)</label>
                <input type="date" id="data_ida" class="form-control">
            </div>
            <div class="col-md-1">
                <label class="small fw-bold">Volta (GMT)</label>
                <input type="date" id="data_volta" class="form-control">
            </div>
            <div class="col-md-1">
                <label class="small fw-bold">Classe</label>
                <select id="classe" class="form-select">
                    <option value="economy" selected>Econômica</option>
                    <option value="business">Executiva</option>
                </select>
            </div>
            <div class="col-md-1">
                <label class="small fw-bold">Passageiros</label>
                <input type="number" id="passageiros" class="form-control" value="1" min="1">
            </div>
            <div class="col-md-2">
                <label class="small fw-bold">Custo Milheiro (R$)</label>
                <input type="number" id="custo_milheiro" class="form-control" value="17.50" step="0.50">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <button class="btn btn-primary w-100 fw-bold" onclick="executarBusca()">BUSCAR</button>
            </div>
        </div>
    </div>

    <div id="loaderArea" class="text-center p-5">
        <div class="spinner-border text-primary"></div>
        <h5 class="mt-3">Auditando tarifas e calculando arbitragem...</h5>
    </div>

    <div id="resultadoArea" style="display:none;">
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 table-v2">
                    <thead class="table-dark">
                        <tr>
                            <th>Trecho Ida</th>
                            <th>Trecho Volta</th>
                            <th class="text-end">Preço Total</th>
                            <th class="text-end text-success">Teto (Pontos/Pessoa)</th>
                            <th class="text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaResultados"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
<script>
    // BASE DE DADOS LOCAL (Inviolável e Instantânea)
    const aeroportos = [
        { name: "São Paulo - Guarulhos", code: "GRU" },
        { name: "São Paulo - Congonhas", code: "CGH" },
        { name: "Campinas - Viracopos", code: "VCP" },
        { name: "Rio de Janeiro - Galeão", code: "GIG" },
        { name: "Rio de Janeiro - Santos Dumont", code: "SDU" },
        { name: "Manaus", code: "MAO" },
        { name: "Buenos Aires - Ezeiza", code: "EZE" },
        { name: "Buenos Aires - Aeroparque", code: "AEP" },
        { name: "Brasília", code: "BSB" },
        { name: "Fortaleza", code: "FOR" },
        { name: "Salvador", code: "SSA" },
        { name: "Recife", code: "REC" },
        { name: "Porto Alegre", code: "POA" },
        { name: "Curitiba", code: "CWB" },
        { name: "Belém", code: "BEL" },
        { name: "Florianópolis", code: "FLN" },
        { name: "Miami", code: "MIA" },
        { name: "Orlando", code: "MCO" },
        { name: "Lisboa", code: "LIS" },
        { name: "Madrid", code: "MAD" },
        { name: "Paris - CDG", code: "CDG" },
        { name: "Nova York - JFK", code: "JFK" }
    ];

    const setupAutocomplete = (id) => {
        new autoComplete({
            selector: `#${id}`,
            data: {
                src: aeroportos,
                keys: ["name", "code"]
            },
            resultItem: {
                element: (item, data) => {
                    item.innerHTML = `<div style="display:flex; justify-content:space-between;">
                        <span>${data.value.name}</span>
                        <span style="font-weight:bold; color:#0d6efd;">${data.value.code}</span>
                    </div>`;
                }
            },
            events: {
                input: {
                    selection: (event) => {
                        const sel = event.detail.selection.value;
                        document.getElementById(id).value = sel.code;
                    }
                }
            }
        });
    };

    setupAutocomplete("origem");
    setupAutocomplete("destino");

    async function executarBusca() {
        const ori = document.getElementById('origem').value.trim().toUpperCase();
        const des = document.getElementById('destino').value.trim().toUpperCase();

        if (ori.length < 3 || des.length < 3) {
            alert("Preencha os códigos IATA (Ex: GRU, MAO, EZE)");
            return;
        }

        const params = {
            origem: ori, destino: des,
            data_ida: document.getElementById('data_ida').value,
            data_volta: document.getElementById('data_volta').value,
            custo_milheiro: parseFloat(document.getElementById('custo_milheiro').value),
            pax: parseInt(document.getElementById('passageiros').value),
            classe: document.getElementById('classe').value
        };

        document.getElementById('loaderArea').style.display = 'block';
        document.getElementById('resultadoArea').style.display = 'none';

        try {
            const res = await fetch('/buscar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(params)
            });
            const data = await res.json();
            
            if(data.status === "sucesso") {
                const tabela = document.getElementById('tabelaResultados');
                tabela.innerHTML = "";
                data.dados.forEach((ida, i) => {
                    if (ida.sentido === "IDA") {
                        const volta = (i + 1 < data.dados.length && data.dados[i+1].sentido === "VOLTA") ? data.dados[i+1] : null;
                        const precoTotalBRL = parseFloat(ida.preco.replace('R$ ', '').replace(/\./g, '').replace(',', '.')) || 0;
                        const teto = Math.floor(((precoTotalBRL / params.pax) - 410) / (params.custo_milheiro / 1000));

                        tabela.innerHTML += `
                            <tr>
                                <td><b>${ida.voo}</b> <span class="horario-tag">${ida.horario}</span><br><small>${ida.data}</small></td>
                                <td>${volta ? `<b>${volta.voo}</b> <span class="horario-tag">${volta.horario}</span><br><small>${volta.data}</small>` : '-'}</td>
                                <td class="text-end fw-bold">${ida.preco}</td>
                                <td class="text-end text-success fw-bold">${teto > 0 ? teto.toLocaleString('pt-BR') + ' pts' : '---'}</td>
                                <td class="text-center"><a href="${ida.link}" target="_blank" class="btn btn-sm btn-dark">VER</a></td>
                            </tr>`;
                    }
                });
                document.getElementById('resultadoArea').style.display = 'block';
            } else { alert(data.mensagem); }
        } catch(e) { alert("Erro no servidor."); }
        finally { document.getElementById('loaderArea').style.display = 'none'; }
    }
</script>
</body>
</html>
