<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMiles Sniper - V2.6.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.02.min.css">
    
    <style>
        :root { 
            --primary-blue: #003580; 
            --accent-blue: #006ce4; 
            --bg-light: #f5f7fa;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
        }

        .hero-bg {
            background-color: var(--primary-blue);
            padding: 40px 0 60px 0;
            color: white;
            margin-bottom: -40px;
        }

        /* Container de Busca com Espaçamento Real */
        .search-box {
            background: #fff;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }

        .field-group {
            position: relative;
            margin-bottom: 10px;
        }

        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #495057;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .custom-input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s;
        }

        .custom-input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(0, 108, 228, 0.1);
        }

        /* Botão Buscar Menor e Alinhado */
        .btn-search-slim {
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 25px;
            font-weight: 700;
            transition: 0.2s;
            height: 45px;
            margin-top: 25px; /* Alinha com os inputs que tem label */
        }

        .btn-search-slim:hover { background: #0051ad; }

        /* Ajuste Autocomplete para não cortar nomes */
        .autoComplete_wrapper { width: 100% !important; }
        .autoComplete_wrapper > ul { 
            z-index: 9999 !important; 
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        /* Cards de Resultado */
        .flight-card {
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            margin-bottom: 15px;
        }

        .price-tag { color: var(--accent-blue); font-size: 1.4rem; font-weight: 800; }
        .points-badge { background: #e7f3ff; color: var(--accent-blue); padding: 5px 12px; border-radius: 20px; font-weight: 800; }

        #loaderArea { display: none; }
    </style>
</head>
<body>

<div class="hero-bg">
    <div class="container text-center">
        <h2 class="fw-bold">MyMiles Sniper</h2>
        <p class="opacity-75 small">Versão 2.6.5</p>
    </div>
</div>

<div class="container">
    <div class="search-box mb-5">
        <div class="row g-3"> <div class="col-md-3">
                <div class="field-group">
                    <label class="field-label">Origem</label>
                    <input id="origem" type="text" class="custom-input" placeholder="Cidade ou Aeroporto" autocomplete="off">
                </div>
            </div>

            <div class="col-md-3">
                <div class="field-group">
                    <label class="field-label">Destino</label>
                    <input id="destino" type="text" class="custom-input" placeholder="Para onde vai?" autocomplete="off">
                </div>
            </div>

            <div class="col-md-2 col-6">
                <div class="field-group">
                    <label class="field-label">Data Ida</label>
                    <input type="date" id="data_ida" class="custom-input">
                </div>
            </div>

            <div class="col-md-2 col-6">
                <div class="field-group">
                    <label class="field-label">Data Volta</label>
                    <input type="date" id="data_volta" class="custom-input">
                </div>
            </div>

            <div class="col-md-2">
                <div class="field-group">
                    <label class="field-label">Classe</label>
                    <select id="classe" class="custom-input">
                        <option value="ECONOMY">Econômica</option>
                        <option value="BUSINESS">Executiva</option>
                    </select>
                </div>
            </div>

            <div class="col-md-2 col-6">
                <div class="field-group">
                    <label class="field-label small">Passageiros</label>
                    <input type="number" id="passageiros" value="1" min="1" class="custom-input">
                </div>
            </div>

            <div class="col-md-2 col-6">
                <div class="field-group">
                    <label class="field-label small">Custo Milheiro</label>
                    <input type="number" id="custo_milheiro" value="17.50" step="0.50" class="custom-input">
                </div>
            </div>

            <div class="col-md-8 text-end">
                <button class="btn-search-slim px-5 shadow-sm" onclick="executarBusca()">
                    <i class="bi bi-search me-2"></i>BUSCAR PASSAGENS
                </button>
            </div>
        </div>
    </div>

    <div id="loaderArea" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 fw-bold text-muted">Buscando tarifas em tempo real...</p>
    </div>

    <div id="resultadoArea" style="display:none;" class="row justify-content-center">
        <div class="col-lg-11" id="tabelaResultados"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
<script>
    const selecionados = { origem: "", destino: "" };

    const setup = (id) => {
        new autoComplete({
            selector: `#${id}`,
            data: {
                src: async (query) => {
                    const source = await fetch(`/api/aeroportos?q=${query}`);
                    return await source.json();
                },
                keys: ["search_key"]
            },
            resultItem: {
                element: (item, data) => {
                    // Exibe Nome Completo e Código na lista
                    item.innerHTML = `
                        <div class="d-flex justify-content-between p-1">
                            <span style="font-size: 0.9rem">${data.value.name}</span>
                            <b class="text-primary ms-2">${data.value.code}</b>
                        </div>`;
                }
            },
            events: {
                input: {
                    selection: (event) => {
                        const feedback = event.detail.selection.value;
                        const inputField = document.getElementById(id);
                        
                        // CORREÇÃO: Define o nome completo no campo e guarda o IATA
                        inputField.value = feedback.name; 
                        selecionados[id] = feedback.code;
                        
                        inputField.blur();
                    }
                }
            }
        });
    };
    
    setup("origem");
    setup("destino");

    async function executarBusca() {
        const getCode = (id) => {
            if (selecionados[id]) return selecionados[id];
            const val = document.getElementById(id).value;
            const m = val.match(/\(([A-Z]{3})\)/);
            return m ? m[1] : val.substring(0,3).toUpperCase();
        };

        const params = {
            origem: getCode('origem'),
            destino: getCode('destino'),
            data_ida: document.getElementById('data_ida').value,
            data_volta: document.getElementById('data_volta').value,
            classe: document.getElementById('classe').value,
            custo_milheiro: parseFloat(document.getElementById('custo_milheiro').value),
            pax: parseInt(document.getElementById('passageiros').value)
        };

        if (!params.origem || !params.data_ida) return alert("Origem e Data de Ida são obrigatórios.");

        document.getElementById('loaderArea').style.display = 'block';
        document.getElementById('resultadoArea').style.display = 'none';

        try {
            const res = await fetch('/buscar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(params)
            });
            const data = await res.json();
            
            if(data.status === "sucesso") {
                const container = document.getElementById('tabelaResultados');
                container.innerHTML = "";
                
                data.dados.forEach(itin => {
                    const taxa = itin.tipo === "RT" ? 480 : 240;
                    const teto = Math.floor((itin.valor_sort - taxa) / (params.custo_milheiro / 1000));
                    
                    container.innerHTML += `
                        <div class="flight-card p-4 mb-3 shadow-sm">
                            <div class="row align-items-center">
                                <div class="col-md-2 text-center border-end">
                                    <h6 class="fw-bold mb-1">${itin.cia}</h6>
                                    <i class="bi bi-airplane text-primary"></i>
                                </div>
                                <div class="col-md-5 px-4">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="badge bg-primary">IDA</span>
                                        <span class="fw-bold">${itin.ida_hora}</span>
                                        <small class="text-muted">${itin.ida_data}</small>
                                    </div>
                                    ${itin.tipo === "RT" ? `
                                    <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                                        <span class="badge bg-secondary">VOLTA</span>
                                        <span class="fw-bold">${itin.volta_hora}</span>
                                        <small class="text-muted">${itin.volta_data}</small>
                                    </div>` : ''}
                                </div>
                                <div class="col-md-3 text-end pe-4 border-start">
                                    <div class="small text-muted">Pagante c/ Taxas</div>
                                    <div class="price-tag">${itin.preco_fmt}</div>
                                </div>
                                <div class="col-md-2 text-center">
                                    <div class="small text-muted mb-1">Teto Sniper</div>
                                    <div class="points-badge mb-2">${teto.toLocaleString('pt-BR')} pts</div>
                                    <a href="${itin.link}" target="_blank" class="btn btn-sm btn-dark w-100 rounded-pill">Ver Voo</a>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('resultadoArea').style.display = 'block';
            }
        } catch(e) { alert("Erro ao conectar com o motor de busca."); }
        finally { document.getElementById('loaderArea').style.display = 'none'; }
    }
</script>
</body>
</html>
