<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMiles Sniper - V2.6.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.02.min.css">
    
    <style>
        :root { --sniper-gold: #fcc419; }
        body { background-color: #f8f9fa; }
        
        /* Ajuste para exibir o ícone de calendário sem sobreposição */
        input[type="date"] {
            font-size: 0.8rem;
            padding-right: 2px !important;
        }

        /* Estilização básica */
        .horario-tag { font-size: 0.8rem; font-weight: bold; background: #f1f3f5; padding: 4px 8px; border-radius: 6px; color: #212529; border: 1px solid #dee2e6; }
        .info-voo { font-size: 0.75rem; color: #6c757d; display: block; margin-top: 5px; line-height: 1.5; }
        .status-badge { font-size: 0.65rem; font-weight: bold; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; }
        .table-v2 td { vertical-align: top; padding: 16px !important; border-bottom: 1px solid #f1f1f1; }
        .table-warning { background-color: #fff9db !important; border-left: 5px solid var(--sniper-gold); }
        
        #loaderArea { display: none; }
        .autoComplete_wrapper { width: 100% !important; }
        .autoComplete_wrapper > input { width: 100% !important; height: 38px; border-radius: 6px !important; border: 1px solid #ced4da !important; font-size: 0.85rem; }
        
        .form-label-sm { font-size: 0.65rem; font-weight: 800; color: #6c757d; margin-bottom: 3px; display: block; text-transform: uppercase; }
        .compact-input { height: 38px; font-size: 0.82rem; padding: 0.375rem 0.4rem; }
    </style>
</head>
<body>

<div class="container-fluid px-3 py-4">
    <div class="card p-3 shadow-sm mb-4 border-0" style="border-radius: 12px;">
        <h6 class="text-primary mb-3 fw-bold"><i class="bi bi-radar"></i> MYMILES SNIPER</h6>
        
        <div class="row g-2 align-items-end">
            <div class="col-md-2">
                <span class="form-label-sm">Origem</span>
                <input id="origem" type="search" placeholder="Ex: São Paulo" class="form-control compact-input" autocomplete="off">
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">Destino</span>
                <input id="destino" type="search" placeholder="Ex: Roma" class="form-control compact-input" autocomplete="off">
            </div>
            
            <div class="col-md-1" style="flex: 0 0 12%; max-width: 12%;">
                <span class="form-label-sm">Data Ida</span>
                <input type="date" id="data_ida" class="form-control compact-input">
            </div>
            <div class="col-md-1" style="flex: 0 0 12%; max-width: 12%;">
                <span class="form-label-sm">Data Volta</span>
                <input type="date" id="data_volta" class="form-control compact-input">
            </div>

            <div class="col-md-1" style="flex: 0 0 7%; max-width: 7%;">
                <span class="form-label-sm">Passag.</span>
                <input type="number" id="passageiros" class="form-control compact-input text-center" value="1" min="1">
            </div>
            
            <div class="col-md-1" style="flex: 0 0 10%; max-width: 10%;">
                <span class="form-label-sm">Classe</span>
                <select id="classe" class="form-select compact-input">
                    <option value="ECONOMY" selected>Econ.</option>
                    <option value="BUSINESS">Exec.</option>
                </select>
            </div>
            
            <div class="col-md-1" style="flex: 0 0 10%; max-width: 10%;">
                <span class="form-label-sm">Milheiro (R$)</span>
                <input type="number" id="custo_milheiro" class="form-control compact-input text-center" value="17.50" step="0.10">
            </div>
            
            <div class="col-md-1" style="flex-grow: 1;">
                <button class="btn btn-primary w-100 fw-bold compact-input" onclick="executarBusca()">
                    <i class="bi bi-search"></i> BUSCAR
                </button>
            </div>
        </div>
    </div>

    <div id="loaderArea" class="text-center p-5">
        <div class="spinner-border text-primary" role="status"></div>
        <h6 class="mt-3 text-secondary fw-bold">Rastreando melhores tarifas...</h6>
    </div>

    <div id="resultadoArea" style="display:none;">
        <div class="card shadow-sm border-0" style="border-radius: 12px; overflow: hidden;">
            <div class="table-responsive">
                <table class="table table-hover mb-0 table-v2">
                    <thead class="table-dark">
                        <tr>
                            <th width="28%">Trecho Ida</th>
                            <th width="28%">Trecho Volta</th>
                            <th class="text-end" width="18%">Preço Pagante</th>
                            <th class="text-end text-warning" width="18%">Teto Sniper (Milhas)</th>
                            <th class="text-center" width="8%">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaResultados"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
<script>
    const aeroportos = [
        { name: "São Paulo - Guarulhos", code: "GRU" }, { name: "São Paulo - Congonhas", code: "CGH" },
        { name: "Rio de Janeiro - Galeão", code: "GIG" }, { name: "Brasília", code: "BSB" },
        { name: "Roma - Fiumicino", code: "FCO" }, { name: "Lisboa", code: "LIS" },
        { name: "Madrid - Barajas", code: "MAD" }, { name: "Londres - Heathrow", code: "LHR" },
        { name: "Paris - CDG", code: "CDG" }, { name: "Frankfurt", code: "FRA" },
        { name: "Miami", code: "MIA" }, { name: "Nova York - JFK", code: "JFK" },
        { name: "Buenos Aires - Ezeiza", code: "EZE" }, { name: "Santiago", code: "SCL" }
    ];

    const selecionados = { origem: "", destino: "" };

    const setup = (id) => {
        new autoComplete({
            selector: `#${id}`,
            data: { src: aeroportos, keys: ["name", "code"] },
            resultItem: { 
                element: (item, data) => {
                    item.innerHTML = `<div class="d-flex justify-content-between" style="font-size:0.8rem"><span>${data.value.name}</span><b class="text-primary">${data.value.code}</b></div>`;
                }
            },
            events: { 
                input: { 
                    selection: (event) => {
                        const sel = event.detail.selection.value;
                        document.getElementById(id).value = sel.name;
                        selecionados[id] = sel.code;
                    }
                } 
            }
        });
    };
    setup("origem"); setup("destino");

    async function executarBusca() {
        const pax = parseInt(document.getElementById('passageiros').value);
        const custo = parseFloat(document.getElementById('custo_milheiro').value);
        
        const getCode = (id) => {
            if (selecionados[id]) return selecionados[id];
            const val = document.getElementById(id).value.trim();
            return val.length === 3 ? val.toUpperCase() : val; 
        };

        const params = {
            origem: getCode('origem'),
            destino: getCode('destino'),
            data_ida: document.getElementById('data_ida').value,
            data_volta: document.getElementById('data_volta').value,
            classe: document.getElementById('classe').value,
            custo_milheiro: custo,
            pax: pax
        };

        if (!params.origem || !params.destino || !params.data_ida) {
            alert("Preencha origem, destino e data de ida!");
            return;
        }

        document.getElementById('loaderArea').style.display = 'block';
        document.getElementById('resultadoArea').style.display = 'none';

        try {
            const res = await fetch('/buscar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(params)
            });
            const data = await res.json();
            
            if(data.status === "sucesso") {
                const tabela = document.getElementById('tabelaResultados');
                tabela.innerHTML = "";
                
                data.dados.forEach((itin, index) => {
                    const precoUnitarioBRL = itin.valor_sort; 
                    const taxaEst = itin.tipo === "RT" ? 480 : 240; 
                    const teto = Math.floor((precoUnitarioBRL - taxaEst) / (custo / 1000));
                    const isBest = index === 0;

                    let row = `<tr class="${isBest ? 'table-warning' : ''}">
                        <td>
                            ${isBest ? '<span class="badge bg-danger mb-1" style="font-size:0.6rem"><i class="bi bi-fire"></i> MELHOR PREÇO</span><br>' : ''}
                            <div class="mb-1">
                                <span class="status-badge bg-primary text-white">IDA</span> <b style="font-size:0.8rem">${itin.cia}</b>
                            </div>
                            <span class="horario-tag"><i class="bi bi-clock"></i> ${itin.ida_hora}</span>
                            <span class="info-voo">
                                <i class="bi bi-calendar3"></i> ${itin.ida_data}<br>
                                <i class="bi bi-geo-alt"></i> ${itin.ida_paradas} • <i class="bi bi-hourglass-split"></i> ${itin.ida_duracao}
                            </span>
                        </td>
                        <td>
                            ${itin.tipo === "RT" ? `
                                <div style="height: 18px"></div>
                                <div class="mb-1">
                                    <span class="status-badge bg-secondary text-white">VOLTA</span> <b style="font-size:0.8rem">${itin.cia}</b>
                                </div>
                                <span class="horario-tag"><i class="bi bi-clock"></i> ${itin.volta_hora}</span>
                                <span class="info-voo">
                                    <i class="bi bi-calendar3"></i> ${itin.volta_data}<br>
                                    <i class="bi bi-geo-alt"></i> ${itin.volta_paradas} • <i class="bi bi-hourglass-split"></i> ${itin.volta_duracao}
                                </span>
                            ` : '<div class="text-muted small mt-4">Trecho Único</div>'}
                        </td>
                        <td class="text-end pt-3">
                            <div class="fw-bold" style="font-size: 1rem;">${itin.preco_fmt}</div>
                            <div class="text-muted" style="font-size: 0.65rem;">por passageiro</div>
                            <div class="text-total-reserva">Total: ${itin.preco_total_fmt}</div>
                        </td>
                        <td class="text-end text-success fw-bold pt-3" style="font-size: 1rem;">
                            ${teto > 0 ? teto.toLocaleString('pt-BR') + ' pts' : '---'}
                            <div class="text-muted fw-normal" style="font-size: 0.6rem;">Sugerido por PAX</div>
                        </td>
                        <td class="text-center pt-3">
                            <a href="${itin.link}" target="_blank" class="btn btn-dark btn-sm rounded-pill px-3">Ver</a>
                        </td>
                    </tr>`;
                    tabela.innerHTML += row;
                });
                document.getElementById('resultadoArea').style.display = 'block';
            } else {
                alert("Erro: " + data.mensagem);
            }
        } catch(e) { 
            alert("Erro na conexão com o servidor."); 
        } finally { 
            document.getElementById('loaderArea').style.display = 'none'; 
        }
    }
</script>
</body>
</html>
