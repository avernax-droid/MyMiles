<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMiles Sniper - V2.5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/css/autoComplete.02.min.css">
    <style>
        .horario-tag { font-size: 0.75rem; font-weight: bold; background: #e9ecef; padding: 2px 6px; border-radius: 4px; color: #495057; }
        .info-voo { font-size: 0.75rem; color: #6c757d; display: block; margin-top: 2px; }
        #loaderArea { display: none; }
        .autoComplete_wrapper { width: 100% !important; }
        .autoComplete_wrapper > input { width: 100% !important; height: 38px; border-radius: 0.375rem !important; }
        .table-v2 td { vertical-align: middle; padding: 12px; border-bottom: 1px solid #eee; }
        .status-badge { font-size: 0.65rem; font-weight: bold; padding: 2px 5px; border-radius: 5px; }
        .form-label-sm { font-size: 0.75rem; font-weight: bold; color: #6c757d; margin-bottom: 2px; display: block; }
    </style>
</head>
<body class="bg-light">

<div class="container-fluid px-4 py-5">
    <div class="card p-4 shadow-sm mb-4 border-0">
        <h2 class="text-primary mb-3 fw-bold">MyMiles Sniper 🎯</h2>
        <div class="row g-2 align-items-end">
            <div class="col-md-2">
                <span class="form-label-sm">Origem</span>
                <input id="origem" type="search" autocomplete="off" placeholder="De onde?" class="form-control">
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">Destino</span>
                <input id="destino" type="search" autocomplete="off" placeholder="Para onde?" class="form-control">
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">Datas (Ida/Volta)</span>
                <div class="input-group">
                    <input type="date" id="data_ida" class="form-control px-1">
                    <input type="date" id="data_volta" class="form-control px-1">
                </div>
            </div>
            <div class="col-md-1">
                <span class="form-label-sm">Passageiros</span>
                <input type="number" id="passageiros" class="form-control" value="1">
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">Classe</span>
                <select id="classe" class="form-select">
                    <option value="ECONOMY" selected>Econômica</option>
                    <option value="BUSINESS">Executiva</option>
                    <option value="FIRST">Primeira Classe</option>
                </select>
            </div>
            <div class="col-md-2">
                <span class="form-label-sm">Custo Milheiro (R$)</span>
                <input type="number" id="custo_milheiro" class="form-control" value="17.50" step="0.50">
            </div>
            <div class="col-md-1">
                <button class="btn btn-primary w-100 fw-bold shadow-sm" onclick="executarBusca()">BUSCAR</button>
            </div>
        </div>
    </div>

    <div id="loaderArea" class="text-center p-5">
        <div class="spinner-border text-primary"></div>
        <h5 class="mt-3">Auditando tarifas (Horário Local)...</h5>
    </div>

    <div id="resultadoArea" style="display:none;">
        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 table-v2">
                    <thead class="table-dark">
                        <tr>
                            <th>Trecho Ida</th>
                            <th>Trecho Volta</th>
                            <th class="text-end">Preço/Pessoa</th>
                            <th class="text-end text-success">Teto (Pontos)</th>
                            <th class="text-center">Link</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaResultados"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tarekraafat/autocomplete.js@10.2.7/dist/autoComplete.min.js"></script>
<script>
    const aeroportos = [
        { name: "São Paulo - Guarulhos", code: "GRU" }, { name: "Manaus", code: "MAO" },
        { name: "Roma - Fiumicino", code: "FCO" }, { name: "Lisboa", code: "LIS" }
    ];

    const setupAutocomplete = (id) => {
        new autoComplete({
            selector: `#${id}`,
            data: { src: aeroportos, keys: ["name", "code"] },
            resultItem: { element: (item, data) => {
                item.innerHTML = `<div style="display:flex; justify-content:space-between;"><span>${data.value.name}</span><b>${data.value.code}</b></div>`;
            }},
            events: { input: { selection: (event) => {
                const sel = event.detail.selection.value;
                document.getElementById(id).value = `${sel.name} - ${sel.code}`;
            }}}
        });
    };
    setupAutocomplete("origem"); setupAutocomplete("destino");

    async function executarBusca() {
        const pax = parseInt(document.getElementById('passageiros').value);
        const custo = parseFloat(document.getElementById('custo_milheiro').value);
        const inputOrigem = document.getElementById('origem').value;
        const inputDestino = document.getElementById('destino').value;

        const params = {
            origem: inputOrigem.slice(-3).toUpperCase(),
            destino: inputDestino.slice(-3).toUpperCase(),
            data_ida: document.getElementById('data_ida').value,
            data_volta: document.getElementById('data_volta').value,
            classe: document.getElementById('classe').value,
            custo_milheiro: custo,
            pax: pax
        };

        if (params.origem.length < 3) { alert("Selecione os aeroportos!"); return; }

        document.getElementById('loaderArea').style.display = 'block';
        document.getElementById('resultadoArea').style.display = 'none';

        try {
            const res = await fetch('/buscar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(params)
            });
            const data = await res.json();
            
            if(data.status === "sucesso") {
                const tabela = document.getElementById('tabelaResultados');
                tabela.innerHTML = "";
                
                for (let i = 0; i < data.dados.length; i++) {
                    let voo = data.dados[i];
                    
                    if (voo.sentido === "IDA") {
                        let ida = voo;
                        let volta = null;

                        if (i + 1 < data.dados.length && data.dados[i+1].sentido === "VOLTA") {
                            volta = data.dados[i+1];
                            i++; 
                        }

                        // O preço agora vem unitário do engine.py (R$ 27.217,50)
                        let precoBRL = parseFloat(ida.preco.replace('R$ ', '').replace(/\./g, '').replace(',', '.')) || 0;
                        
                        // Teto: (Preço em Dinheiro - 410 taxas) / (Custo Milheiro / 1000)
                        let teto = Math.floor((precoBRL - 410) / (custo / 1000));

                        let row = `<tr>
                            <td>
                                <span class="status-badge bg-primary text-white">IDA</span><br>
                                <b>${ida.voo}</b> <span class="horario-tag">${ida.horario} (Local)</span>
                                <span class="info-voo">${ida.data} • ${ida.classe} • ${ida.escalas}</span>
                            </td>
                            <td>
                                ${volta ? `
                                    <span class="status-badge bg-secondary text-white">VOLTA</span><br>
                                    <b>${volta.voo}</b> <span class="horario-tag">${volta.horario} (Local)</span>
                                    <span class="info-voo">${volta.data} • ${volta.classe} • ${volta.escalas}</span>
                                ` : '<span class="text-muted">Só Ida</span>'}
                            </td>
                            <td class="text-end fw-bold">${ida.preco}</td>
                            <td class="text-end text-success fw-bold">${teto > 0 ? teto.toLocaleString('pt-BR') + ' pts' : '---'}</td>
                            <td class="text-center"><a href="${ida.link}" target="_blank" class="btn btn-sm btn-dark">VER</a></td>
                        </tr>`;
                        tabela.innerHTML += row;
                    }
                }
                document.getElementById('resultadoArea').style.display = 'block';
            } else {
                alert("Erro: " + data.mensagem);
            }
        } catch(e) { 
            alert("Erro na conexão."); 
        } finally { 
            document.getElementById('loaderArea').style.display = 'none'; 
        }
    }
</script>
</body>
</html>
