<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyMiles - Auditoria Inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 900px; margin-top: 50px; }
        .card { border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-logo { color: #0d6efd; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="text-center mb-4">
        <h1 class="header-logo">MyMiles ✈️</h1>
        <p class="text-muted">Compare valores de voos e milhas de forma transparente</p>
    </div>

    <div class="card p-4 mb-4">
        <h5>Nova Auditoria</h5>
        <div class="mb-3">
            <label for="jsonInput" class="form-label">Cole os dados da busca aqui (JSON):</label>
            <textarea class="form-control" id="jsonInput" rows="5" placeholder='Cole o conteúdo do arquivo dadoslatam.json aqui...'></textarea>
        </div>
        <button class="btn btn-primary w-100" onclick="enviarParaAuditoria()">Analisar e Comparar</button>
    </div>

    <div id="resultadoArea" style="display: none;">
        <div class="card p-4">
            <h5>Resultados da Comparação</h5>
            <table class="table table-hover mt-3">
                <thead class="table-light">
                    <tr>
                        <th>Voo</th>
                        <th>Origem/Destino</th>
                        <th>Data/Hora</th>
                        <th>Milhas</th>
                        <th>Taxas</th>
                        <th>Custo Total Est.</th>
                    </tr>
                </thead>
                <tbody id="tabelaResultados">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    async function enviarParaAuditoria() {
        const jsonText = document.getElementById('jsonInput').value;
        const tabela = document.getElementById('tabelaResultados');
        const areaResultados = document.getElementById('resultadoArea');

        try {
            // Envia para o seu servidor Docker
            const response = await fetch('http://localhost:5000/auditar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: jsonText
            });

            const data = await response.json();
            
            // Limpa a tabela anterior
            tabela.innerHTML = '';

            // Preenche com os novos dados
            data.voos.forEach(voo => {
                const row = `<tr>
                    <td><strong>${voo.voo}</strong></td>
                    <td>${voo.origem} ➔ ${voo.destino}</td>
                    <td>${voo.data_hora}</td>
                    <td>${voo.milhas.toLocaleString()}</td>
                    <td>R$ ${voo.taxas}</td>
                    <td class="text-primary font-weight-bold">R$ ${voo.custo_total_estimado}</td>
                </tr>`;
                tabela.innerHTML += row;
            });

            areaResultados.style.display = 'block';

        } catch (error) {
            alert('Erro ao conectar com o servidor Docker. Verifique se ele está rodando na porta 5000.');
            console.error(error);
        }
    }
</script>

</body>
</html>
